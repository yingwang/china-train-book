site_name: "中国高铁游指南"
site_description: "杭州出发 · 不自驾 · 舒适 · 优先住万豪"
site_url: https://yingwang.github.io/china-train-book/
repo_name: yingwang/china-train-book
repo_url: https://github.com/yingwang/china-train-book
edit_uri: edit/main/docs/
docs_dir: docs
site_dir: _site
theme:
  name: material
  language: zh
  features:
    - navigation.indexes
    - navigation.expand
    - toc.follow
    - toc.integrate
    - content.code.copy
    - content.action.edit
  palette:
    - scheme: default
      primary: red
      accent: red
markdown_extensions:
  - toc:
      permalink: true
      toc_depth: 2
  - admonition
  - attr_list
extra_css:
  - stylesheets/extra.css
nav:
  - 首页: index.md
  - 序言: chapters/00-preface.md
  - 一 杭州本地: chapters/01-hangzhou.md
  - 二 短途圈（1-2小时）: chapters/02-near.md
  - 三 中途圈（3-4小时）: chapters/03-mid.md
  - 四 长途圈（5-7小时）: chapters/04-far.md
  - 五 超长途（7小时+ / 转车 / 动卧）: chapters/05-extra-long.md
  - 六 主题线路: chapters/06-themed.md
  - 七 季节推荐: chapters/07-seasonal.md
  - 八 实用信息: chapters/08-practical.md
  - 附录 - 图片来源: images/CREDITS.md
